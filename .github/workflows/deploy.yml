name: Deploy Frontend Only

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Force Build Frontend (Disable Typecheck & Server)
        # DB와 환경변수가 없어서 빌드가 깨지는 현상을 강제로 우회합니다.
        run: npx vite build --config client/vite.config.ts --emptyOutDir
        env:
          NODE_ENV: production
          VITE_DISABLE_SERVER: "true"
          DATABASE_URL: "mysql://localhost:3306/mock" # 가짜 주소 주입
          JWT_SECRET: "temporary_secret_key"          # 가짜 키 주입

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



